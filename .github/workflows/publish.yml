name: Publish
on:
  push:
    branches:
      - 'master'
jobs:
  publish:
    if: github.repository_owner == 'skript-minestom'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: graalvm
          java-version: 25
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish to Maven Repository
        run: ./gradlew publish
        env:
          REPO_HAPILY_USERNAME: ${{ secrets.REPO_HAPILY_USERNAME }}
          REPO_HAPILY_PASSWORD: ${{ secrets.REPO_HAPILY_PASSWORD }}
